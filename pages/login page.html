<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="../img/icon.svg" />
    <link rel="stylesheet" href="../style/reset style.css" />
    <link rel="stylesheet" href="../style/form style.css" />
    <link
      href="https://fonts.googleapis.com/css?family=Poppins:100,100italic,200,200italic,300,300italic,regular,italic,500,500italic,600,600italic,700,700italic,800,800italic,900,900italic"
      rel="stylesheet"
    />
    <title>Login</title>
  </head>
  <body>
    <!-- <div class="wrapper"></div> -->
    <div class="form__logo">
      <a href="../index.html" class="form__link">
        <img src="" alt="Logo" />
      </a>
    </div>

    <div class="form__container">
      <h1 class="form__title">Login</h1>
      <div class="form__text">
        <p>Login with your Voiso ID to access your account</p>
      </div>

      <form id="login-form" class="form" action="" method="post">
        <!-- <div class="form__group">
          <label for="name">Name</label>
          <input type="text" id="name" />
        </div> -->

        <div class="form__groups">
          <div class="form__group">
            <label for="email" class="text-label">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              class="input"
              placeholder="Enter email"
              required
            />

            <div class="form-error__email"></div>
          </div>

          <div class="form__group">
            <label for="email" class="text-label">Password</label>
            <div class="form-password">
              <input
                type="password"
                id="password"
                name="password"
                class="input"
                placeholder="Enter password"
                required
              />
              <button type="button" class="button-eye">
                <img
                  src="../img/icons/close eye.svg"
                  alt="Close eye"
                  class="icon-eye"
                />
              </button>
            </div>
            <div class="form-error__password"></div>
          </div>
        </div>
        <button type="submit" class="form-button button">Login</button>
        <div
          id="g_id_onload"
          data-client_id="YOUR_CLIENT_ID.apps.googleusercontent.com"
          data-context="signin"
          data-ux_mode="popup"
          data-callback="handleCredentialResponse"
          data-auto_prompt="false"
        ></div>

        <div
          class="g_id_signin"
          data-type="standard"
          data-shape="rectangular"
          data-theme="outline"
          data-text="signin_with"
          data-size="large"
          data-logo_alignment="left"
        ></div>
      </form>
    </div>

    <div class="support__links">
      <div class="support__text">
        Forgot password?
        <a href="#" class="support__link">Click here to reset it.</a>
      </div>
      <div class="support__text">
        Don't have account yet?
        <a href="#" class="support__link"> Contact us to get a free trial.</a>
      </div>
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="../script/script form login.js"></script>
  </body>
</html>
